<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Reset ──────────────────────────────────────────────── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    /* ── Dark Theme (default) ──────────────────────────────── */
    :root, [data-theme="dark"] {
      --bg: #1a1a1f;
      --bg2: #141418;
      --surf: #222228;
      --surf-h: #2a2a32;
      --brd: rgba(255,255,255,0.08);
      --txt: #f0f0f2;
      --txt2: #8c8c99;
      --txtm: #555560;
      --acc: #3b5bff;
      --send-bg: #f0f0f2;
      --send-ic: #1a1a1f;
      --inp-bg: #222228;
      --card: #202026;
      --success: #22c55e;
      --error: #ef4444;
      --warn: #f59e0b;
    }

    /* ── Light Theme ───────────────────────────────────────── */
    [data-theme="light"] {
      --bg: #f5f5f7;
      --bg2: #eeeef0;
      --surf: #ffffff;
      --surf-h: #f0f0f2;
      --brd: rgba(0,0,0,0.08);
      --txt: #111114;
      --txt2: #666670;
      --txtm: #99999f;
      --acc: #3b5bff;
      --send-bg: #111114;
      --send-ic: #ffffff;
      --inp-bg: #f0f0f2;
      --card: #ffffff;
      --success: #16a34a;
      --error: #dc2626;
      --warn: #d97706;
    }

    /* ── Base ───────────────────────────────────────────────── */
    html, body {
      width: 340px;
      height: 100vh;
      font-family: 'Geist', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--txt);
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--brd);
      background: var(--bg);
      flex-shrink: 0;
    }
    .header-left { display:flex; align-items:center; gap:8px; }
    .header-logo {
      width: 24px; height: 24px;
      border-radius: 6px;
      background: var(--acc);
      display: flex; align-items:center; justify-content:center;
      font-size: 12px; font-weight: 700; color: #fff;
    }
    .header-logo img { width:24px; height:24px; border-radius:6px; object-fit:cover; }
    .header-title { font-size:14px; font-weight:600; }
    .header-actions { display:flex; gap:4px; }
    .header-btn {
      background: none; border:none; color:var(--txt2); cursor:pointer;
      width:28px; height:28px; border-radius:6px; display:flex;
      align-items:center; justify-content:center; font-size:14px;
      transition: background 0.15s;
    }
    .header-btn:hover { background: var(--surf-h); }

    /* ── Tabs (bottom nav) ──────────────────────────────────── */
    .tabs {
      display: flex;
      border-top: 1px solid var(--brd);
      background: var(--bg);
      flex-shrink: 0;
    }
    .tab {
      flex: 1;
      padding: 10px 0;
      text-align: center;
      font-size: 11px;
      font-weight: 500;
      color: var(--txt2);
      background: none;
      border: none;
      cursor: pointer;
      border-top: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab:hover { color: var(--txt); }
    .tab.active {
      color: var(--acc);
      border-top-color: var(--acc);
    }
    .tab-icon { font-size:16px; display:block; margin-bottom:2px; }

    /* ── Pages ──────────────────────────────────────────────── */
    .page {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    .page.active { display: flex; }

    /* ── Chat Page ──────────────────────────────────────────── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .chat-messages::-webkit-scrollbar { width:4px; }
    .chat-messages::-webkit-scrollbar-thumb { background:var(--txtm); border-radius:2px; }

    .msg { max-width:85%; line-height:1.5; font-size:13px; }
    .msg-user {
      align-self: flex-end;
      background: var(--acc);
      color: #fff;
      padding: 10px 14px;
      border-radius: 16px 16px 4px 16px;
    }
    .msg-ai {
      align-self: flex-start;
      color: var(--txt);
      padding: 4px 0;
    }
    .msg-system {
      align-self: center;
      color: var(--txt2);
      font-size: 12px;
      text-align: center;
      padding: 8px;
    }

    .typing-indicator {
      display: flex; gap:4px; padding:8px 0; align-self:flex-start;
    }
    .typing-dot {
      width:6px; height:6px; border-radius:50%; background:var(--txt2);
      animation: typingBounce 1.4s infinite ease-in-out both;
    }
    .typing-dot:nth-child(2) { animation-delay:0.16s; }
    .typing-dot:nth-child(3) { animation-delay:0.32s; }
    @keyframes typingBounce {
      0%,80%,100% { transform:scale(0.6); opacity:0.4; }
      40% { transform:scale(1); opacity:1; }
    }

    .chat-input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--brd);
      background: var(--bg);
      flex-shrink: 0;
    }
    .chat-input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--inp-bg);
      border: 1px solid var(--brd);
      border-radius: 16px;
      padding: 8px 12px;
      transition: border-color 0.15s;
    }
    .chat-input-wrap:focus-within { border-color: var(--acc); }
    #chat-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--txt);
      font-family: inherit;
      font-size: 13px;
      resize: none;
      max-height: 120px;
      line-height: 1.4;
    }
    #chat-input::placeholder { color: var(--txtm); }
    .send-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--send-bg);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.1s;
    }
    .send-btn:disabled { opacity:0.3; cursor:default; }
    .send-btn:not(:disabled):hover { transform:scale(1.05); }
    .send-btn svg { fill:var(--send-ic); width:16px; height:16px; }

    /* ── Settings Page ─────────────────────────────────────── */
    .settings-page { padding:16px; overflow-y:auto; gap:16px; }
    .section { margin-bottom:20px; }
    .section-title {
      font-size:11px; font-weight:600; text-transform:uppercase;
      letter-spacing:0.5px; color:var(--txt2); margin-bottom:10px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--brd);
      border-radius: 12px;
      padding: 14px;
    }
    .card + .card { margin-top:8px; }
    .card-label { font-size:12px; color:var(--txt2); margin-bottom:4px; }
    .card-value { font-size:13px; font-weight:500; }
    .status-dot {
      display:inline-block; width:8px; height:8px; border-radius:50%;
      margin-right:6px; vertical-align:middle;
    }
    .status-dot.green { background:var(--success); }
    .status-dot.red { background:var(--error); }
    .status-dot.yellow { background:var(--warn); }

    .input-field {
      width:100%; padding:10px 12px; border-radius:10px;
      border:1px solid var(--brd); background:var(--inp-bg);
      color:var(--txt); font-family:inherit; font-size:13px;
      outline:none; transition: border-color 0.15s;
    }
    .input-field:focus { border-color:var(--acc); }

    .btn {
      display:inline-flex; align-items:center; justify-content:center;
      padding:10px 16px; border-radius:10px; border:none;
      font-family:inherit; font-size:13px; font-weight:500;
      cursor:pointer; transition: opacity 0.15s, transform 0.1s;
    }
    .btn:hover { transform:scale(1.02); }
    .btn-primary { background:var(--acc); color:#fff; }
    .btn-danger { background:var(--error); color:#fff; }
    .btn-ghost { background:transparent; color:var(--acc); border:1px solid var(--brd); }
    .btn-block { width:100%; }
    .btn + .btn { margin-top:8px; }

    .link {
      color:var(--acc); text-decoration:none; font-size:12px;
      display:inline-block; margin-top:8px;
    }
    .link:hover { text-decoration:underline; }

    .toggle-row {
      display:flex; align-items:center; justify-content:space-between;
      padding:10px 0;
    }
    .toggle-label { font-size:13px; }
    .toggle {
      position:relative; width:40px; height:22px; cursor:pointer;
    }
    .toggle input { display:none; }
    .toggle-slider {
      position:absolute; inset:0; background:var(--txtm); border-radius:11px;
      transition:background 0.2s;
    }
    .toggle-slider::after {
      content:''; position:absolute; width:18px; height:18px;
      left:2px; top:2px; background:#fff; border-radius:50%;
      transition:transform 0.2s;
    }
    .toggle input:checked + .toggle-slider { background:var(--acc); }
    .toggle input:checked + .toggle-slider::after { transform:translateX(18px); }

    /* ── Project Page ──────────────────────────────────────── */
    .project-page { padding:16px; overflow-y:auto; gap:12px; }
    .project-card {
      background:var(--card); border:1px solid var(--brd);
      border-radius:12px; padding:14px; cursor:pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .project-card:hover { border-color:var(--acc); background:var(--surf-h); }
    .project-card.selected { border-color:var(--acc); }
    .project-name { font-size:13px; font-weight:500; margin-bottom:4px; }
    .project-id { font-size:11px; color:var(--txt2); font-family:monospace; }

    .empty-state {
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; flex:1; gap:8px; color:var(--txt2);
      text-align:center; padding:24px; font-size:13px;
    }
    .empty-icon { font-size:32px; opacity:0.5; }
  </style>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="header-logo" id="header-logo">⚡</div>
        <span class="header-title" id="header-title">Speed</span>
      </div>
      <div class="header-actions">
        <button class="header-btn" id="btn-theme" title="Trocar tema">🌙</button>
      </div>
    </div>

    <!-- CHAT PAGE -->
    <div class="page active" id="page-chat">
      <div class="chat-messages" id="chat-messages">
        <div class="msg msg-system" id="chat-status">Abra o Lovable.dev para começar</div>
      </div>
      <div class="chat-input-area">
        <div class="chat-input-wrap">
          <textarea id="chat-input" rows="1" placeholder="Escreva sua mensagem..."></textarea>
          <button class="send-btn" id="btn-send" disabled>
            <svg viewBox="0 0 24 24"><path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.59 5.58L20 12l-8-8z"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- SETTINGS PAGE -->
    <div class="page settings-page" id="page-settings">
      <!-- Account section -->
      <div class="section">
        <div class="section-title">Conta</div>
        <div id="settings-account">
          <!-- Filled by JS -->
        </div>
      </div>

      <!-- Token section -->
      <div class="section">
        <div class="section-title">Token Lovable</div>
        <div id="settings-token">
          <!-- Filled by JS -->
        </div>
      </div>

      <!-- Theme section -->
      <div class="section">
        <div class="section-title">Aparência</div>
        <div class="card">
          <div class="toggle-row">
            <span class="toggle-label">Modo Escuro</span>
            <label class="toggle">
              <input type="checkbox" id="toggle-dark" checked>
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
      </div>
    </div>

    <!-- PROJECT PAGE -->
    <div class="page project-page" id="page-project">
      <div class="section">
        <div class="section-title">Projeto Ativo</div>
        <div id="active-project">
          <!-- Filled by JS -->
        </div>
      </div>
      <div class="section">
        <div class="section-title">Seus Projetos</div>
        <div id="projects-list">
          <div class="empty-state">
            <div class="empty-icon">📁</div>
            <span>Carregando projetos...</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Bottom Tabs -->
    <div class="tabs">
      <button class="tab active" data-page="page-chat">
        <span class="tab-icon">💬</span>
        Chat
      </button>
      <button class="tab" data-page="page-settings">
        <span class="tab-icon">⚙️</span>
        Config
      </button>
      <button class="tab" data-page="page-project">
        <span class="tab-icon">📂</span>
        Projeto
      </button>
    </div>
  </div>

  <script src="panel.js"></script>
</body>
</html>
