<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Starble Speed Panel</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#7c3aed;--bg:#0a0a0f;--fg:#f5f5f7;--fg2:rgba(245,245,247,0.75);
  --muted:rgba(245,245,247,0.38);--glass-border:rgba(255,255,255,0.11);
  --sep:rgba(255,255,255,0.07);--ok:#30d158;--err:#ff453a;
  --font:-apple-system,"SF Pro Display",system-ui,sans-serif;
}
html,body{width:100%;height:100vh;background:var(--bg);font-family:var(--font);color:var(--fg);overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}
.hdr{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:0.5px solid var(--sep);flex-shrink:0}
.hdr-title{font-size:13px;font-weight:700;flex:1}
.messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:88%;font-size:13px;line-height:1.5;padding:10px 14px;border-radius:14px}
.msg-user{align-self:flex-end;background:var(--primary);color:#fff;border-radius:14px 14px 4px 14px}
.msg-ai{align-self:flex-start;background:rgba(255,255,255,0.06);color:var(--fg);border-radius:14px 14px 14px 4px}
.msg-system{align-self:center;color:var(--muted);font-size:11px;text-align:center}
.input-area{padding:10px 14px;border-top:0.5px solid var(--sep);flex-shrink:0}
.input-wrap{display:flex;gap:8px;align-items:flex-end;background:rgba(255,255,255,0.06);border:0.5px solid var(--glass-border);border-radius:14px;padding:8px 12px}
.input-wrap:focus-within{border-color:rgba(124,58,237,0.5)}
#msg-input{flex:1;background:none;border:none;outline:none;color:var(--fg);font-size:13px;font-family:var(--font);resize:none;max-height:100px;line-height:1.4}
#msg-input::placeholder{color:var(--muted)}
.send-btn{width:30px;height:30px;border-radius:50%;background:var(--primary);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn:disabled{opacity:0.3;cursor:default}
.send-btn svg{fill:#fff;width:14px;height:14px}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <span class="hdr-title">⚡ Starble Speed</span>
  </div>
  <div class="messages" id="messages">
    <div class="msg msg-system">Abra um projeto no Lovable.dev para começar</div>
  </div>
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="msg-input" rows="1" placeholder="Envie uma mensagem..."></textarea>
      <button class="send-btn" id="btn-send" disabled>
        <svg viewBox="0 0 24 24"><path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.59 5.58L20 12l-8-8z"/></svg>
      </button>
    </div>
  </div>
</div>
<script>
'use strict';
const SUPABASE = 'https://qlhhmmboxlufvdtpbrsm.supabase.co';
const input = document.getElementById('msg-input');
const sendBtn = document.getElementById('btn-send');
const messagesEl = document.getElementById('messages');

input.addEventListener('input', () => { sendBtn.disabled = !input.value.trim(); });
input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
sendBtn.addEventListener('click', sendMessage);

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; sendBtn.disabled = true;
  addMsg('user', text);

  const data = await chrome.storage.local.get(['clf_license','clf_lovable_token','clf_project']);
  if (!data.clf_license || !data.clf_lovable_token || !data.clf_project?.id) {
    addMsg('system', 'Configure licença e token primeiro.');
    return;
  }

  try {
    const res = await fetch(SUPABASE + '/functions/v1/send-message', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-clf-token': data.clf_license,
        'x-clf-extension': 'speed',
      },
      body: JSON.stringify({
        projectId: data.clf_project.id,
        lovableToken: data.clf_lovable_token,
        message: text,
        mode: 'fix',
      }),
    });
    const j = await res.json();
    if (j.ok) { addMsg('ai', 'Mensagem enviada ao projeto. ID: ' + (j.messageId || '').slice(0,8) + '…'); }
    else { addMsg('system', 'Erro: ' + (j.error || res.status)); }
  } catch (e) { addMsg('system', 'Erro: ' + e.message); }
}

function addMsg(type, text) {
  const d = document.createElement('div');
  d.className = 'msg msg-' + type;
  d.textContent = text;
  messagesEl.appendChild(d);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
</script>
</body>
</html>
